networks:
  app-tier:
    driver: bridge

services:

  smtp:
    image: mailhog/mailhog
    container_name: smtp-agente
    ports:
      - "1025:1025"
      - "8025:8025"

  redis:
    image: redis/redis-stack:latest
    container_name: redis-agente
    ports:
      - "6379:6379"
      - "8001:8001"